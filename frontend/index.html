      function createImageEditorButton() {
        setTimeout(function() {
          try {
            // 创建图片编辑入口按钮
            var btn = document.createElement('a');
            btn.href = '/image-editor.html';
            btn.target = '_blank';
            btn.style.cssText = 'display:flex;align-items:center;gap:8px;padding:10px 16px;color:#fff;text-decoration:none;border-radius:6px;margin:2px 8px;transition:background 0.2s;font-size:14px;cursor:pointer;';

            btn.onmouseover = function() { this.style.background = 'rgba(255,255,255,0.1)'; };
            btn.onmouseout = function() { this.style.background = ''; };

            // 监听下拉菜单展开事件，找到图片处理下拉菜单后添加入口
            var observer = new MutationObserver(function(mutations) {
              for (var i = 0; i < mutations.length; i++) {
                var mutation = mutations[i];
                if (mutation.type === 'childList' && mutation.addedNodes.length > 0) {
                  for (var j = 0; j < mutation.addedNodes.length; j++) {
                    var node = mutation.addedNodes[j];
                    if (node.nodeType === 1) { // Element node
                      // 检查是否包含"绘画机器人"等下拉菜单项
                      if (node.textContent && node.textContent.includes('绘画机器人')) {
                        // 找到下拉菜单容器，直接添加
                        node.appendChild(btn);
                        console.log('图片编辑入口已添加到下拉菜单');
                        observer.disconnect();
                        return;
                      }
                    }
                  }
                }
              }
            });

            // 观察整个document的变化
            observer.observe(document.body, { childList: true, subtree: true });

            // 备用方法：5秒后如果还没找到，手动尝试
            setTimeout(function() {
              observer.disconnect();
              // 尝试直接查找已展开的下拉菜单
              var dropdowns = document.querySelectorAll('[class*="dropdown"], [class*="menu"], .ant-dropdown');

            console.error('添加图片编辑入口失败:', e);

      // 重写 deductUserCompute 函数
      function rewriteDeductFunction() {
        if (!window.deductUserCompute) return false;

        try {
          window.deductUserCompute = function(cost, feature) {
            try {
              let currentUserStr = localStorage.getItem('current_user');
              let currentUser = null;

              // 如果 current_user 不存在，自动从 user_compute_data 获取
              if (!currentUserStr) {
                const computeDataStr = localStorage.getItem('user_compute_data');
                if (computeDataStr) {
                  try {
                    const computeData = JSON.parse(computeDataStr);
                    if (computeData && computeData.username) {
                      currentUser = {
                        id: computeData.userId,
                        username: computeData.username,
                        email: computeData.email || '',
                        role: 'user',
                        computePoints: computeData.computePoints || 10000
                      };
                      localStorage.setItem('current_user', JSON.stringify(currentUser));
                    }
                  } catch (e) {}
                }
              }

              if (!currentUserStr && !currentUser) {
                // 如果仍然没有用户，创建一个虚拟用户（用于算力扣除）
                currentUser = {
                  id: 'virtual_user_' + Date.now(),
                  username: 'guest',
                  email: '',
                  role: 'user',
                  computePoints: 1000000
                };
                localStorage.setItem('current_user', JSON.stringify(currentUser));
              }

              if (!currentUser) {
                currentUser = JSON.parse(currentUserStr);
              }

              // 获取或初始化 admin_users
              let adminUsers = [];
              try {
                adminUsers = JSON.parse(localStorage.getItem('admin_users') || '[]');
              } catch (e) {
                adminUsers = [];
              }

              const userIndex = adminUsers.findIndex(u => u.id === currentUser.id);
              if (userIndex === -1) {
                // 用户不存在于 admin_users，自动添加
                adminUsers.push({
                  id: currentUser.id,
                  username: currentUser.username,
                  email: currentUser.email || '',
                  role: currentUser.role || 'user',
                  computePoints: currentUser.computePoints || 10000
                });
              }

              const user = adminUsers.find(u => u.id === currentUser.id) || currentUser;

              // 即使算力不足也允许扣除（不做限制）
              adminUsers.forEach(u => {
                if (u.id === currentUser.id) {
                  u.computePoints = (u.computePoints || 0) - cost;
                }
              });

              localStorage.setItem('admin_users', JSON.stringify(adminUsers));

              // 更新 current_user
              currentUser.computePoints = user.computePoints - cost;
              localStorage.setItem('current_user', JSON.stringify(currentUser));

              // 同步更新 user_compute_data
              const computeDataStr = localStorage.getItem('user_compute_data');
              if (computeDataStr) {
                try {
                  const computeData = JSON.parse(computeDataStr);
                  computeData.computePoints = currentUser.computePoints;
                  computeData.totalConsumed = (computeData.totalConsumed || 0) + cost;
                  localStorage.setItem('user_compute_data', JSON.stringify(computeData));
                } catch (e) {}
              }

              console.log('算力扣除成功:', { cost: cost, remaining: currentUser.computePoints, feature: feature });

              // 触发 UI 更新事件
              window.dispatchEvent(new CustomEvent('user_compute_changed', {
                detail: { userId: currentUser.id, balance: currentUser.computePoints }
              }));

              return true;
            } catch (e) {
              console.log('算力扣除完成（不阻塞功能）:', e.message);
              return true; // 始终返回true，不阻塞功能
            }
          };
          console.log('deductUserCompute 函数已重写');
          return true;
        } catch (e) {
          console.error('重写函数失败:', e);
          return false;
        }
      }

      // 初始化 admin_users
      function initUserComputeSystem() {
        try {
          let currentUserStr = localStorage.getItem('current_user');
          let currentUser = null;

          // 如果 current_user 不存在，尝试从 user_compute_data 获取
          if (!currentUserStr) {

            if (computeDataStr) {
              try {
                const computeData = JSON.parse(computeDataStr);
                if (computeData && computeData.username) {

                    id: computeData.userId,
                    username: computeData.username,
                    email: computeData.email || '',
                    role: 'user',
                    computePoints: computeData.computePoints || 1000
                  };
                  // 保存到 current_user
                  localStorage.setItem('current_user', JSON.stringify(currentUser));
                  console.log('从 user_compute_data 初始化 current_user 成功');
                }
              } catch (e) {
                console.error('解析 user_compute_data 失败:', e);
              }
            }
          }

          if (!currentUserStr && !currentUser) return;

          if (!currentUser) {
            currentUser = JSON.parse(currentUserStr);
          }
          if (!currentUser || !currentUser.id) return;

          let adminUsers = [];
          try {
            adminUsers = JSON.parse(localStorage.getItem('admin_users') || '[]');
          } catch (e) {
            adminUsers = [];
          }

          const existingIndex = adminUsers.findIndex(u => u.id === currentUser.id);
          if (existingIndex === -1) {
            adminUsers.push({
              id: currentUser.id,
              username: currentUser.username,
              email: currentUser.email || '',
              role: currentUser.role || 'user',
              computePoints: currentUser.computePoints || 1000
            });
          } else {
            adminUsers[existingIndex].computePoints = currentUser.computePoints || adminUsers[existingIndex].computePoints || 1000;
          }

          localStorage.setItem('admin_users', JSON.stringify(adminUsers));
          console.log('用户算力系统已初始化:', adminUsers);
        } catch (e) {
          console.error('初始化用户算力系统失败:', e);
        }
      }

      // 全局Fetch拦截器 - 自动扣除算力
      function setupFetchInterceptor() {
        if (window.originalFetch) return;

        const originalFetch = window.fetch;
        window.originalFetch = originalFetch;

        window.fetch = function(input, init) {
          const url = typeof input === 'string' ? input : (input.url || '');
          const method = (init && init.method) || 'GET';

          // 检查是否是AI相关的API请求（包括外部AI服务）
          const aiApiPatterns = [
            // 后端API
            '/api/ai-', '/api/chat', '/api/completions',
            '/api/jimeng/', '/api/kb/', '/api/302/',
            '/api/claude', '/api/gpt', '/api/gemini',
            '/api/deepseek', '/api/glm', '/api/qwen',
            // 外部AI服务
            'api.302.ai', 'api.openai.com', 'api.anthropic.com',
            'api.claude.ai', 'generativelanguage.googleapis.com',
            'api.deepseek.com', 'open.bigmodel.cn', 'dashscope.aliyuncs.com'
          ];

          const isAiApi = aiApiPatterns.some(pattern => url.includes(pattern));

          if (isAiApi && method === 'POST') {
            // 尝试扣除算力
            setTimeout(() => {
              if (window.deductUserCompute) {
                // 根据API类型设置不同的算力费用
                let cost = 1; // 默认1点
                if (url.includes('jimeng') || url.includes('video') || url.includes('sora') || url.includes('veo')) {
                  cost = 50; // 视频生成50点
                } else if (url.includes('image') || url.includes('生图') || url.includes('dalle') || url.includes('midjourney')) {
                  cost = 10; // 图片生成10点
                } else if (url.includes('claude') || url.includes('gpt-5') || url.includes('gemini-2.5') || url.includes('opus')) {
                  cost = 5; // 高级模型5点
                } else {
                  cost = 1; // 普通聊天1点
                }

                const result = window.deductUserCompute(cost, 'AI API调用');
                console.log('AI请求算力自动扣除:', { url: url, cost: cost, result: result });
              }
            }, 100);
          }

          return originalFetch.apply(this, arguments);
        };
        console.log('Fetch拦截器已设置');
      }

      // 抖音提取函数
      window.extractDouyin = async function() {
        const url = document.getElementById('douyin-url-input').value.trim();
        if (!url) {
          alert('请输入抖音视频链接');
          return;
        }

        if (!url.includes('douyin.com') && !url.includes('iesdouyin.com')) {
          alert('请输入正确的抖音链接');
          return;
        }

        const resultArea = document.getElementById('extract-result-area');
        const resultContent = document.getElementById('extract-result-content');
        resultArea.style.display = 'block';
        resultContent.innerHTML = '⏳ 正在提取抖音视频数据...';

        try {
          // 调用后端API
          const response = await fetch('/api/douyin/extract', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url })
          });

          if (response.ok) {
            const data = await response.json();
            resultContent.innerHTML = formatDouyinResult(data);
          } else {
            resultContent.innerHTML = '❌ 提取失败，请检查链接是否有效';
          }
        } catch (error) {
          console.error('提取错误:', error);
          resultContent.innerHTML = '❌ 网络错误，请稍后重试';
        }
      };

      // 格式化抖音结果
      function formatDouyinResult(data) {
        return `
📱 视频标题: ${data.title || data.desc || '未知'}

📝 视频文案:
${data.desc || data.text || '无'}

📊 互动数据:
  👍 点赞: ${data.likes || data.digg_count || '-'}
  💬 评论: ${data.comments || data.comment_count || '-'}
  ⭐ 收藏: ${data.collects || data.collect_count || '-'}
  🔄 转发: ${data.shares || data.share_count || '-'}
        `;
      }

      // 小红书提取函数 - 使用Coze智能体
      window.extractXiaohongshu = async function() {
        const url = document.getElementById('xiaohongshu-url-input').value.trim();
        if (!url) {
          alert('请输入小红书链接');
          return;
        }

        if (!url.includes('xiaohongshu.com') && !url.includes('xhslink.com')) {
          alert('请输入正确的小红书链接');
          return;

              </div>
              <h4 class="text-indigo-300 font-medium mb-2 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path></svg>
                AI 智能分析
              </h4>
              <p class="text-sm text-indigo-100/80 leading-relaxed">
                为您找到 ${results.length} 项与"${keyword}"相关的专利技术。该领域近期技术活跃度较高，主要集中在${results[0]?.assignee || '相关企业'}等申请人。建议关注其核心权利要求及技术演进路线。
              </p>
            </div>
          `;

          // 结果列表
          results.forEach(item => {
            // 高亮关键词
            const snippet = (item.snippet || '').replace(new RegExp(keyword, 'gi'), '<span class="bg-yellow-500/20 text-yellow-200 px-1 rounded">$ கரிம</span>');
            
            html += `
              <div class="group bg-slate-800/40 border border-white/5 hover:border-blue-500/30 rounded-xl p-5 transition-all duration-300 hover:bg-slate-800/60 hover:shadow-lg hover:shadow-blue-900/10">
                <div class="flex justify-between items-start gap-4">
                  <div class="flex-1">
                    <a href="${item.link || '#'}" target="_blank" class="text-lg font-medium text-blue-400 hover:text-blue-300 hover:underline mb-2 block line-clamp-1">
                      ${item.title || '无标题'}
                    </a>
                    <div class="flex flex-wrap gap-3 text-xs text-gray-400 mb-3">
                      ${item.assignee ? `<span class="flex items-center gap-1 bg-white/5 px-2 py-1 rounded">🏢 ${item.assignee}</span>` : ''}
                      ${item.filing_date ? `<span class="flex items-center gap-1 bg-white/5 px-2 py-1 rounded">📅 ${item.filing_date}</span>` : ''}
                      ${item.patent_id ? `<span class="flex items-center gap-1 bg-white/5 px-2 py-1 rounded">🆔 ${item.patent_id}</span>` : ''}
                    </div>
                    <p class="text-sm text-gray-300 leading-relaxed line-clamp-3 group-hover:line-clamp-none transition-all">
                      ${snippet}
                    </p>
                  </div>
                  <div class="opacity-0 group-hover:opacity-100 transition-opacity self-center">
                    <a href="${item.link || '#'}" target="_blank" class="p-2 bg-blue-600/20 text-blue-400 rounded-lg hover:bg-blue-600 hover:text-white transition-colors flex items-center gap-1 text-xs font-medium whitespace-nowrap">
                      查看详情 <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg>
                    </a>
                  </div>
                </div>
              </div>
            `;
          });
          
          listContainer.innerHTML = html;
        }
        
        listContainer.classList.remove('hidden');
      }

      // 导出结果
      window.exportPatentResults = function() {
        const results = window.currentPatentResults || [];
        if (results.length === 0) {
          alert('暂无结果可导出');
          return;
        }
        
        const input = document.getElementById('patentKeywordInput');
        const keyword = input ? input.value.trim() : '专利';
        
        let csvContent = '\uFEFF标题,申请人,申请日,专利号,摘要,链接\n';
        results.forEach(r => {
          csvContent += [
            `"${(r.title || '').replace(/"/g, '""')}"`,
            `"${(r.assignee || '').replace(/"/g, '""')}"`,
            `"${(r.filing_date || '').replace(/"/g, '""')}"`,
            `"${(r.patent_id || '').replace(/"/g, '""')}"`,
            `"${(r.snippet || '').replace(/"/g, '""')}"`,
            `"${(r.link || '').replace(/"/g, '""')}"`
          ].join(',') + '\n';
        });
        
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `专利搜索_${keyword}_${new Date().toISOString().slice(0, 10)}.csv`;
        link.click();
      };
    </script>
  </body>
</html>
